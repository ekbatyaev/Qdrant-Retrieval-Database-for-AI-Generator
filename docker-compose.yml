services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage

  app:
    build: .
    container_name: lua_search_api
    depends_on:
      - qdrant
    ports:
      - "8001:8000"
    env_file:
      - .env

volumes:
  qdrant_storage: